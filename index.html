<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Love Promise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        video.playing {
            opacity: 1;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #aaa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 14px;
            text-align: center;
            z-index: 10;
        }
        #loading .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 3px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        #loading .dot:nth-child(1) { animation-delay: -0.32s; }
        #loading .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <video
        id="myVideo"
        src="lovepromise.mp4"
        preload="auto"
        autoplay
        muted
        playsinline
        webkit-playsinline
        x5-video-player-type="h5-page"
        x5-video-player-fullscreen="true"
        x5-video-orientation="portraint"
        x5-video-show-fullscreen-btn="false"
        loop
        crossorigin="anonymous"
    ></video>

    <script>
        (function() {
            var video = document.getElementById('myVideo');
            var loading = document.getElementById('loading');
            var started = false;

            // 强制静音和内联播放属性
            video.muted = true;
            video.playsInline = true;
            video.autoplay = true;
            video.setAttribute('muted', '');
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');

            // 视频开始播放后的处理
            function onPlaying() {
                if (!started) {
                    started = true;
                    video.classList.add('playing');
                    if (loading) { loading.style.display = 'none'; }
                }
            }
            video.addEventListener('playing', onPlaying);
            video.addEventListener('timeupdate', onPlaying);

            // 视频加载出错
            video.addEventListener('error', function(e) {
                console.error('视频加载失败:', video.error);
                if (loading) {
                    loading.innerHTML = '<div style="color:#fff;font-size:16px;">视频加载中...</div>';
                }
            });

            // 强制播放
            function tryPlay() {
                if (video.paused) {
                    var p = video.play();
                    if (p && p.then) {
                        p.then(function() {
                            onPlaying();
                        }).catch(function() {});
                    }
                } else {
                    onPlaying();
                }
            }

            // 多时间点重试
            function schedulePlays() {
                tryPlay();
                [100, 300, 500, 1000, 2000, 5000].forEach(function(delay) {
                    setTimeout(tryPlay, delay);
                });
            }

            // 视频数据就绪事件
            video.addEventListener('canplay', tryPlay);
            video.addEventListener('canplaythrough', tryPlay);
            video.addEventListener('loadeddata', tryPlay);
            video.addEventListener('loadedmetadata', tryPlay);

            // 手动加载
            video.load();

            // DOM 就绪
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', schedulePlays);
            } else {
                schedulePlays();
            }
            window.addEventListener('load', schedulePlays);

            // 页面可见时恢复播放
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) { tryPlay(); }
            });

            // 微信/QQ 浏览器
            document.addEventListener('WeixinJSBridgeReady', function() {
                video.play();
                schedulePlays();
            }, false);

            // 用户交互触发
            ['touchstart', 'touchend', 'click'].forEach(function(evt) {
                document.addEventListener(evt, tryPlay, { passive: true, once: true });
            });

            // 微信 iOS WKWebView
            window.addEventListener('pageshow', function(e) {
                if (e.persisted) { tryPlay(); }
            });

            // 视频被暂停时自动恢复
            video.addEventListener('pause', function() {
                if (!video.ended) {
                    setTimeout(function() {
                        if (video.paused && !video.ended) {
                            tryPlay();
                        }
                    }, 200);
                }
            });

            // 浏览器窗口大小改变时重试
            window.addEventListener('resize', function() {
                if (video.paused) { tryPlay(); }
            });

            // 页面上下滚动后重试
            window.addEventListener('scroll', function() {
                if (video.paused) { tryPlay(); }
            }, { passive: true });

        })();
    </script>
</body>
</html>
